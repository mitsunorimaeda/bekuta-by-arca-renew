functionsDirectory = "/Users/mitsunorimaeda/Desktop/bekuta-production/netlify/functions"
functionsDirectoryOrigin = "default"
headersOrigin = "config"
redirectsOrigin = "config"
plugins = []

[build]
publish = "/Users/mitsunorimaeda/Desktop/bekuta-production/dist"
publishOrigin = "config"
commandOrigin = "config"
command = "npm run build"
functions = "/Users/mitsunorimaeda/Desktop/bekuta-production/netlify/functions"

[build.environment]
NODE_VERSION = "18.20.8"
NODE_OPTIONS = "--max-old-space-size=4096"

[build.processing]

[build.processing.css]

[build.processing.html]

[build.processing.images]

[build.processing.js]

[build.services]

[functions]

[functions."*"]

[[headers]]
for = "/assets/*"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/index.html"

[headers.values]
Cache-Control = "no-store, no-cache, must-revalidate"

[[headers]]
for = "/manifest.json"

[headers.values]
Cache-Control = "no-cache"

[[headers]]
for = "/sw.js"

[headers.values]
Cache-Control = "no-cache"

[[headers]]
for = "/*"

[headers.values]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[redirects]]
from = "/assets/*"
to = "/assets/:splat"
status = 200.0
force = false

